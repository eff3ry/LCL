name: Nightly LC Launcher
on:
    workflow_dispatch:
    schedule:
        - cron: "0 0 * * *"

jobs:
    build:
        name: Build all
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Source
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"

            - name: System Dependencies
              run: |
                  apt-get update
                  apt-get install -y jq zip tar binutils

            - name: Node Dependencies
              run: npm run setup

            - name: Build
              run: npm run Build

            - name: Publish Release
              uses: ncipollo/release-action@v1
              with:
                  tag: "nightly"
                  name: "Nightly Build"
                  body: "This is generated at 00:00 UTC every day from the main branch"
                  prerelease: true
                  allowUpdates: true
                  replacesArtifacts: true
                  artifacts: "dist/*.zip,dist/*.tar.gz"
